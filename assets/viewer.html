<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visor de PDF - Gestion SB</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <style>
        body { margin: 0; padding: 0; background-color: #333; display: flex; flex-direction: column; align-items: center; min-height: 100vh; font-family: sans-serif; }
        #canvas-container { width: 100%; display: flex; flex-direction: column; align-items: center; padding: 20px 0; }
        canvas { box-shadow: 0 10px 30px rgba(0,0,0,0.5); margin-bottom: 20px; max-width: 100%; height: auto !important; }
        #loading { color: white; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); font-weight: bold; }
    </style>
</head>
<body>
    <div id="loading">Cargando catálogo...</div>
    <div id="canvas-container"></div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const pdfUrl = urlParams.get('file');

        if (pdfUrl) {
            pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

            const loadingTask = pdfjsLib.getDocument(pdfUrl);
            loadingTask.promise.then(pdf => {
                document.getElementById('loading').style.display = 'none';
                const container = document.getElementById('canvas-container');
                
                // Renderizar todas las páginas
                for (let pageNum = 1; pageNum <= pdf.numPages; pageNum++) {
                    pdf.getPage(pageNum).then(page => {
                        const viewport = page.getViewport({ scale: 1.5 });
                        const canvas = document.createElement('canvas');
                        const context = canvas.getContext('2d');
                        canvas.height = viewport.height;
                        canvas.width = viewport.width;

                        const renderContext = {
                            canvasContext: context,
                            viewport: viewport
                        };
                        container.appendChild(canvas);
                        page.render(renderContext);
                    });
                }
            }).catch(err => {
                document.getElementById('loading').innerText = 'No se pudo cargar el PDF. Puede que sea muy pesado o no exista.';
                console.error(err);
            });
        } else {
            document.getElementById('loading').innerText = 'No se especificó ningún archivo.';
        }
    </script>
</body>
</html>
