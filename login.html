<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso Gestión SB | Stefanía Barroso</title>
    <link rel="icon" type="image/png" href="assets/img/logo_2.png">
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
    <!-- Tailwind & SweetAlert2 (diferido para no bloquear render) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary:      '#00a876',
                        secondary:    '#d4af37',
                        brandText:    '#064e3b',
                        brandSubtext: '#4B5563',
                    },
                    fontFamily: {
                        poppins: ['Poppins', 'sans-serif'],
                        brand:   ['Dancing Script', 'cursive'],
                    },
                }
            }
        }
    </script>
    <link rel="stylesheet" href="styles/colores.css">
    <link rel="stylesheet" href="styles/main.css">
    
    <!-- Vercel Speed Insights -->
    <script>
        window.si = window.si || function () { (window.siq = window.siq || []).push(arguments); };
    </script>
    <script defer src="/_vercel/speed-insights/script.js"></script>
</head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen p-4 overflow-hidden relative">
    
    <!-- Background Accents -->
    <div class="absolute top-0 right-0 -mr-20 -mt-20 w-80 h-80 bg-primary/10 rounded-full blur-3xl"></div>
    <div class="absolute bottom-0 left-0 -ml-20 -mb-20 w-80 h-80 bg-secondary/10 rounded-full blur-3xl"></div>

    <!-- Login Container (Subplaca) -->
    <div class="w-full max-w-md relative z-10 transition-all duration-700 transform translate-y-0 opacity-100" id="login-container">
        <div class="glass-card rounded-[2.5rem] shadow-2xl p-8 md:p-10 border border-white">
            <!-- Header -->
            <div class="text-center mb-10">
                <img src="assets/img/logo_2.png" alt="Stefanía Barroso" class="h-20 mx-auto mb-4 hover:scale-105 transition-transform cursor-pointer" onclick="window.location.href='index.html'">
                <h1 class="text-3xl font-bold text-brandText mb-2 font-brand">
                    Stefanía <span class="text-secondary">Barroso</span>
                </h1>
                <p class="text-gray-500 font-medium text-sm tracking-widest uppercase">Panel de Gestión</p>
            </div>

            <!-- Form -->
            <form id="login-form" class="space-y-6">
                <div class="space-y-2">
                    <label for="username" class="text-xs font-bold uppercase tracking-widest text-brandText/60 ml-2">Usuario / Email</label>
                    <input type="text" id="username" name="username" aria-label="Usuario o Email"
                        class="w-full px-5 py-4 rounded-2xl bg-gray-50 border border-transparent focus:bg-white focus:border-primary focus:ring-2 focus:ring-primary/20 transition-all outline-none text-brandText"
                        placeholder="Ingresá tu usuario" required autocomplete="username">
                </div>
                
                <div class="space-y-2">
                    <label for="password" class="text-xs font-bold uppercase tracking-widest text-brandText/60 ml-2">Contraseña</label>
                    <input type="password" id="password" name="password" aria-label="Contraseña"
                        class="w-full px-5 py-4 rounded-2xl bg-gray-50 border border-transparent focus:bg-white focus:border-primary focus:ring-2 focus:ring-primary/20 transition-all outline-none text-brandText"
                        placeholder="••••••••" required autocomplete="current-password">
                </div>

                <div class="flex items-center justify-between px-2">
                    <label class="flex items-center space-x-2 cursor-pointer">
                        <input type="checkbox" class="w-4 h-4 rounded text-primary focus:ring-primary border-gray-300">
                        <span class="text-sm text-gray-600">Recordarme</span>
                    </label>
                    <a href="#" class="text-sm text-primary font-bold hover:underline">Olvidé mi clave</a>
                </div>

                <div class="pt-4">
                    <button type="submit" id="submit-btn" class="w-full bg-brandText hover:bg-primary text-white font-black py-5 rounded-2xl transition-all shadow-xl hover:shadow-primary/20 transform active:scale-95 flex items-center justify-center space-x-3 uppercase tracking-widest">
                        <span>Ingresar al Sistema</span>
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M14 5l7 7m0 0l-7 7m7-7H3" /></svg>
                    </button>
                </div>
            </form>

            <!-- Footer -->
            <div class="mt-12 text-center">
                <p class="text-gray-400 text-xs">Desarrollado por <span class="font-bold">Gestión SB</span> &copy; 2026</p>
            </div>
        </div>

        <!-- Back Link -->
        <div class="text-center mt-8">
            <a href="index.html" class="inline-flex items-center space-x-2 text-brandText/60 hover:text-primary transition-colors font-bold text-sm uppercase tracking-tighter">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M10 19l-7-7m0 0l7-7m-7 7h18" /></svg>
                <span>Volver a la web</span>
            </a>
        </div>
    </div>

    <!-- Telemetry & Auth Logic -->
    <script>
        const SB_Auth = {
            init: () => {
                const form = document.getElementById('login-form');
                form.addEventListener('submit', SB_Auth.handleLogin);
                
                // Animación de entrada
                setTimeout(() => {
                    document.getElementById('login-container').classList.add('translate-y-0', 'opacity-100');
                }, 100);
            },
            handleLogin: async (e) => {
                e.preventDefault();
                const btn = document.getElementById('submit-btn');
                const originalText = btn.innerHTML;
                
                // Loading State
                btn.disabled = true;
                btn.innerHTML = `
                    <svg class="animate-spin h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                    </svg>
                    <span>Verificando...</span>
                `;

                // TODO: Reemplazar por fetch real a /api/auth o endpoint PHP
                // Las credenciales NUNCA deben validarse en el frontend.
                setTimeout(() => {
                    const username = document.getElementById('username').value;
                    const pass     = document.getElementById('password').value;

                    // Validación temporal (reemplazar por autenticación real)
                    if (username === 'admin' && pass === 'stefy2026') {
                        SB_Auth.onSuccess();
                    } else {
                        SB_Auth.onError();
                        btn.disabled    = false;
                        btn.innerHTML   = originalText;
                    }
                }, 1500);
            },
            onSuccess: () => {
                Swal.fire({
                    title: '¡Acceso Correcto!',
                    text: 'Bienvenida Stefy Barroso. Redirigiendo al panel...',
                    icon: 'success',
                    timer: 2000,
                    showConfirmButton: false,
                    background: '#fff',
                    color: '#064e3b',
                    timerProgressBar: true
                }).then(() => {
                    // Aquí iría la redirección al Dashboard REAL
                    window.location.href = 'index.html'; // Temporalmente vuelve al home
                });
            },
            onError: () => {
                Swal.fire({
                    title: 'Error de Acceso',
                    text: 'Usuario o contraseña incorrectos. Por favor, verificá tus datos.',
                    icon: 'error',
                    confirmButtonColor: '#064e3b',
                    confirmButtonText: 'Reintentar'
                });
            }
        };

        SB_Auth.init();
    </script>
</body>
</html>
